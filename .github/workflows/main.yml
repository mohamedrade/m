name: Freqtrade FastMicroScalp

on:
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Freqtrade
        run: |
          pip install --upgrade pip
          pip install freqtrade

      - name: Setup Config & Strategy
        run: |
          mkdir -p user_data/strategies

          # ==================== CONFIG.JSON ====================
          cat > user_data/config.json << 'EOF'
          {
              "max_open_trades": 25,
              "stake_currency": "USDT",
              "stake_amount": "unlimited",
              "tradable_balance_ratio": 0.95,
              "dry_run": true,
              "dry_run_wallet": 1000,
              "timeframe": "1m",
              "exchange": {
                  "name": "gateio",
                  "pair_whitelist": []
              },
              "pairlists": [
                  {
                      "method": "VolumePairList",
                      "number_assets": 120,
                      "sort_key": "quoteVolume",
                      "min_value": 800000
                  }
              ],
              "telegram": {
                  "enabled": true,
                  "token": "8678435064:AAGLXfPRTuk64LPzSBWFMBDXBnuNyDi-_gQ",
                  "chat_id": "978554149"
              }
          }
          EOF

          # ==================== FastMicroScalp Strategy ====================
          cat > user_data/strategies/FastMicroScalp.py << 'EOF'
from freqtrade.strategy import IStrategy, IntParameter, DecimalParameter
from pandas import DataFrame
import pandas_ta as ta
import numpy as np

class FastMicroScalp(IStrategy):
    INTERFACE_VERSION = 3
    timeframe = '1m'
    can_short = False

    minimal_roi = {
        "0":  0.0045,
        "10": 0.006,
        "30": 0.009,
        "60": 0.012
    }

    stoploss = -0.0085

    trailing_stop = True
    trailing_stop_positive = 0.0035
    trailing_stop_positive_offset = 0.005
    trailing_only_offset_is_reached = True

    fast_ema = IntParameter(5, 12, default=7, space='buy')
    slow_ema = IntParameter(15, 30, default=21, space='buy')
    rsi_buy = DecimalParameter(25, 45, default=38, space='buy')
    rsi_sell = DecimalParameter(55, 75, default=65, space='sell')

    def populate_indicators(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
        dataframe['fast_ema'] = ta.ema(dataframe['close'], length=self.fast_ema.value)
        dataframe['slow_ema'] = ta.ema(dataframe['close'], length=self.slow_ema.value)
        dataframe['rsi'] = ta.rsi(dataframe['close'], length=14)
        dataframe['vol_ma'] = ta.sma(dataframe['volume'], length=20)
        dataframe['vol_ratio'] = dataframe['volume'] / dataframe['vol_ma']
        return dataframe

    def populate_entry_trend(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
        dataframe.loc[
            (
                (dataframe['fast_ema'] > dataframe['slow_ema']) &
                (dataframe['fast_ema'].shift(1) <= dataframe['slow_ema'].shift(1)) &
                (dataframe['rsi'] < self.rsi_buy.value) &
                (dataframe['vol_ratio'] > 1.4)
            ),
            ['enter_long', 'enter_tag']
        ] = (1, 'fast_scalp')

        return dataframe

    def populate_exit_trend(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
        dataframe.loc[
            (
                (dataframe['fast_ema'] < dataframe['slow_ema']) &
                (dataframe['fast_ema'].shift(1) >= dataframe['slow_ema'].shift(1)) &
                (dataframe['rsi'] > self.rsi_sell.value)
            ),
            ['exit_long', 'exit_tag']
        ] = (1, 'fast_scalp_exit')

        return dataframe
EOF

      - name: Run Bot
        run: |
          freqtrade trade \
            --config user_data/config.json \
            --strategy FastMicroScalp \
            --userdir user_data \
            --dry-run
